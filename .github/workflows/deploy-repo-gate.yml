name: deploy-repo-gate

on:
  pull_request:
    branches-ignore: [gh-pages]

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changed
        run: |
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          git diff --name-only "origin/${{ github.base_ref }}...HEAD" > .changed-files.txt
          cat .changed-files.txt

      - name: Enforce protected directories (unless platform-admin label)
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          python3 scripts/ci/check-deploy-repo-path-gate.py \
            --changed-files .changed-files.txt \
            --event-path "${{ github.event_path }}"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Smart CS contract gate
        run: bash scripts/ci/check-smart-cs-contract.sh

      - name: Smart CS smoke targets gate
        run: bash scripts/ci/check-smart-cs-smoke-targets.sh

      - name: Plaintext secret scan
        run: bash scripts/ci/check-no-plain-secrets.sh .changed-files.txt

      - name: Detect pgvector related changes
        id: pgvector
        run: |
          if grep -Eq '^(apps/ljwx-dify/|apps/n8n/|config/dify/|cluster/.*postgres)' .changed-files.txt; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check pgvector baseline
        if: steps.pgvector.outputs.required == 'true'
        run: bash scripts/ops/check-pgvector.sh

      - name: Validate release queue structure
        run: uvx --with pyyaml python scripts/promoter/validate_queue.py

      - name: Evidence validate + collect (dry run)
        run: |
          uvx --with pyyaml --with jsonschema python scripts/evidence/validate.py
          uvx --with pyyaml --with jsonschema python scripts/evidence/collect.py --out /tmp/evidence-index.json --summary /tmp/evidence-latest.md
