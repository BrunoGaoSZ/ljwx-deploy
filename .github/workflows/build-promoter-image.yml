name: build-promoter-image

on:
  push:
    branches-ignore: [gh-pages]
    paths:
      - scripts/promoter/promote.py
      - scripts/promoter/Dockerfile
      - .github/workflows/build-promoter-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          OWNER_LOWER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER_LOWER}/ljwx-deploy-promoter"
          SHA_TAG="sha-${GITHUB_SHA::12}"
          {
            echo "image=${IMAGE}"
            echo "sha_tag=${SHA_TAG}"
            echo "tags<<EOF"
            echo "${IMAGE}:${SHA_TAG}"
            if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
              echo "${IMAGE}:main"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push promoter image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: scripts/promoter/Dockerfile
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "image=${{ steps.prep.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "sha_tag=${{ steps.prep.outputs.sha_tag }}" >> "$GITHUB_STEP_SUMMARY"
