name: nightly-evidence

on:
  push:
    branches-ignore: [gh-pages]
    paths-ignore: ['**']
  schedule:
    # 02:00 Asia/Tokyo (JST) = 17:00 UTC previous day
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-evidence-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Validate and collect evidence
        run: |
          uvx --with pyyaml --with jsonschema python scripts/evidence/validate.py
          uvx --with pyyaml --with jsonschema python scripts/evidence/collect.py --out evidence/index.json --summary evidence/summary/latest.md
          uvx --with pyyaml python scripts/promoter/queue_metrics.py --queue release/queue.yaml --out evidence/metrics/queue-health.json

      - name: Build publish payload (atomic staging)
        run: |
          rm -rf .publish-tmp
          mkdir -p .publish-tmp/evidence/summary .publish-tmp/evidence/metrics
          cp pages/index.html pages/app.js .publish-tmp/
          cp evidence/index.json .publish-tmp/evidence/index.json
          cp evidence/summary/latest.md .publish-tmp/evidence/summary/latest.md
          cp evidence/metrics/queue-health.json .publish-tmp/evidence/metrics/queue-health.json
          python3 - <<'PY'
          import json, pathlib
          feed = pathlib.Path('.publish-tmp/evidence/index.json')
          data = json.loads(feed.read_text(encoding='utf-8'))
          if not isinstance(data, list):
              raise SystemExit('evidence/index.json must be an array')
          print(f'staged records: {len(data)}')
          PY

      - name: Publish to gh-pages branch
        run: |
          set -euo pipefail
          rm -rf .gh-pages-wt
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git worktree add --force -B gh-pages .gh-pages-wt origin/gh-pages
          else
            git worktree add --force -B gh-pages .gh-pages-wt
          fi

          cd .gh-pages-wt
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R ../.publish-tmp/. .

          python3 - <<'PY'
          import json
          from pathlib import Path

          index_path = Path("evidence/index.json")
          if not index_path.exists():
              raise SystemExit("missing evidence/index.json in gh-pages payload")
          data = json.loads(index_path.read_text(encoding="utf-8"))
          if not isinstance(data, list):
              raise SystemExit("evidence/index.json in gh-pages payload must be an array")
          print(f"publish records: {len(data)}")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          extra_tracked="$(git ls-files | grep -Ev '^(index\.html|app\.js|evidence/index\.json|evidence/summary/latest\.md|evidence/metrics/queue-health\.json)$' || true)"
          if [ -n "${extra_tracked}" ]; then
            echo "Unexpected tracked files in gh-pages branch:"
            echo "${extra_tracked}"
            exit 1
          fi

          if git diff --cached --quiet; then
            echo "No changes to publish"
            exit 0
          fi

          git commit -m "pages: update evidence feed [skip ci]"
          git push origin HEAD:gh-pages
