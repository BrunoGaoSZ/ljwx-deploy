apiVersion: batch/v1
kind: CronJob
metadata:
  name: deploy-promoter
  namespace: dev
  labels:
    app.kubernetes.io/name: deploy-promoter
    app.kubernetes.io/part-of: bid-mvp-factory
spec:
  schedule: "*/10 * * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: promoter
              image: ghcr.io/brunogao/ljwx-deploy-promoter:main
              imagePullPolicy: Always
              env:
                - name: GIT_BRANCH
                  value: main
                - name: DEPLOY_REPO_URL
                  value: https://github.com/BrunoGaoSZ/ljwx-deploy.git
                - name: SERVICE_MAP_PATH
                  value: release/services.local-k3s.yaml
                - name: ENV_ALLOWLIST
                  value: "dev,demo"
                - name: SKIP_REGISTRY_CHECK
                  value: "0"
                - name: SKIP_EVIDENCE_COLLECT
                  value: "0"
                - name: RETRY_MAX
                  value: "10"
                - name: HARBOR_INSECURE
                  value: "1"
                - name: DEPLOY_REPO_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: deploy_repo_token
                      optional: true
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: github_token
                      optional: true
                - name: HARBOR_URL
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: harbor_local_url
                      optional: true
                - name: HARBOR_URL_FALLBACK
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: harbor_url
                      optional: true
                - name: HARBOR_USER
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: harbor_local_username
                      optional: true
                - name: HARBOR_USER_FALLBACK
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: harbor_username
                      optional: true
                - name: HARBOR_PASS
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: harbor_local_password
                      optional: true
                - name: HARBOR_PASS_FALLBACK
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: harbor_password
                      optional: true
              command:
                - /bin/bash
                - -lc
                - |
                  set -euo pipefail
                  if [ -z "${HARBOR_URL:-}" ] && [ -n "${HARBOR_URL_FALLBACK:-}" ]; then
                    export HARBOR_URL="${HARBOR_URL_FALLBACK}"
                  fi
                  if [ -z "${HARBOR_USER:-}" ] && [ -n "${HARBOR_USER_FALLBACK:-}" ]; then
                    export HARBOR_USER="${HARBOR_USER_FALLBACK}"
                  fi
                  if [ -z "${HARBOR_PASS:-}" ] && [ -n "${HARBOR_PASS_FALLBACK:-}" ]; then
                    export HARBOR_PASS="${HARBOR_PASS_FALLBACK}"
                  fi
                  if [ -z "${DEPLOY_REPO_TOKEN:-}" ] && [ -n "${GITHUB_TOKEN:-}" ]; then
                    export DEPLOY_REPO_TOKEN="${GITHUB_TOKEN}"
                  fi
                  if [ -z "${DEPLOY_REPO_TOKEN:-}" ]; then
                    echo "缺少 DEPLOY_REPO_TOKEN（请在 deploy-promoter-secret 中配置 deploy_repo_token）"
                    exit 1
                  fi
                  rm -rf /work/repo
                  git clone --depth=1 "https://x-access-token:${DEPLOY_REPO_TOKEN}@${DEPLOY_REPO_URL#https://}" /work/repo
                  cd /work/repo

                  cmd=(
                    python3 scripts/promoter/promote.py
                    --local-repo-dir /work/repo
                    --service-map "${SERVICE_MAP_PATH}"
                    --push-branch "${GIT_BRANCH}"
                    --retry-max "${RETRY_MAX}"
                  )
                  if [ -n "${ENV_ALLOWLIST:-}" ]; then
                    cmd+=(--env-allowlist "${ENV_ALLOWLIST}")
                  fi
                  if [ -n "${HARBOR_URL:-}" ]; then
                    cmd+=(--harbor-url "${HARBOR_URL}")
                  fi
                  if [ -n "${HARBOR_USER:-}" ]; then
                    cmd+=(--harbor-user "${HARBOR_USER}")
                  fi
                  if [ -n "${HARBOR_PASS:-}" ]; then
                    cmd+=(--harbor-pass "${HARBOR_PASS}")
                  fi
                  if [ "${SKIP_REGISTRY_CHECK:-0}" = "1" ] || [ "${SKIP_REGISTRY_CHECK:-}" = "true" ] || [ "${SKIP_REGISTRY_CHECK:-}" = "TRUE" ]; then
                    cmd+=(--skip-registry-check)
                  fi
                  if [ "${HARBOR_INSECURE:-0}" = "1" ] || [ "${HARBOR_INSECURE:-}" = "true" ] || [ "${HARBOR_INSECURE:-}" = "TRUE" ]; then
                    cmd+=(--harbor-insecure)
                  fi
                  if [ "${SKIP_EVIDENCE_COLLECT:-0}" = "1" ] || [ "${SKIP_EVIDENCE_COLLECT:-}" = "true" ] || [ "${SKIP_EVIDENCE_COLLECT:-}" = "TRUE" ]; then
                    cmd+=(--skip-evidence-collect)
                  fi
                  "${cmd[@]}"
