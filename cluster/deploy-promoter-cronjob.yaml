apiVersion: batch/v1
kind: CronJob
metadata:
  name: deploy-promoter
  namespace: dev
  labels:
    app.kubernetes.io/name: deploy-promoter
    app.kubernetes.io/part-of: bid-mvp-factory
spec:
  schedule: "*/10 * * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: promoter
              image: ghcr.io/brunogaosz/ljwx-deploy-promoter:main
              imagePullPolicy: Always
              env:
                - name: GIT_BRANCH
                  value: main
                - name: DEPLOY_REPO_URL
                  value: https://github.com/BrunoGaoSZ/ljwx-deploy.git
                - name: SERVICE_MAP_PATH
                  value: release/services.local-k3s.yaml
                - name: SKIP_REGISTRY_CHECK
                  value: "1"
                - name: SKIP_EVIDENCE_COLLECT
                  value: "0"
                - name: RETRY_MAX
                  value: "10"
                - name: DEPLOY_REPO_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: deploy_repo_token
                      optional: true
                - name: GITHUB_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: github_token
                      optional: true
                - name: HARBOR_URL
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: harbor_url
                      optional: true
                - name: HARBOR_USER
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: harbor_username
                      optional: true
                - name: HARBOR_PASS
                  valueFrom:
                    secretKeyRef:
                      name: deploy-promoter-secret
                      key: harbor_password
                      optional: true
              command:
                - /bin/bash
                - -lc
                - |
                  set -euo pipefail
                  if [ -z "${DEPLOY_REPO_TOKEN:-}" ] && [ -n "${GITHUB_TOKEN:-}" ]; then
                    export DEPLOY_REPO_TOKEN="${GITHUB_TOKEN}"
                  fi
                  if [ -z "${DEPLOY_REPO_TOKEN:-}" ]; then
                    echo "缺少 DEPLOY_REPO_TOKEN（请在 deploy-promoter-secret 中配置 deploy_repo_token）"
                    exit 1
                  fi

                  cmd=(
                    python3 /app/scripts/promoter/promote.py
                    --deploy-repo-url "${DEPLOY_REPO_URL}"
                    --deploy-repo-token "${DEPLOY_REPO_TOKEN}"
                    --service-map "${SERVICE_MAP_PATH}"
                    --push-branch "${GIT_BRANCH}"
                    --retry-max "${RETRY_MAX}"
                  )
                  if [ "${SKIP_REGISTRY_CHECK:-0}" = "1" ] || [ "${SKIP_REGISTRY_CHECK:-}" = "true" ] || [ "${SKIP_REGISTRY_CHECK:-}" = "TRUE" ]; then
                    cmd+=(--skip-registry-check)
                  fi
                  if [ "${SKIP_EVIDENCE_COLLECT:-0}" = "1" ] || [ "${SKIP_EVIDENCE_COLLECT:-}" = "true" ] || [ "${SKIP_EVIDENCE_COLLECT:-}" = "TRUE" ]; then
                    cmd+=(--skip-evidence-collect)
                  fi
                  "${cmd[@]}"
