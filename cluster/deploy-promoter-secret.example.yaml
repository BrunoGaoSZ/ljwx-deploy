apiVersion: v1
kind: Secret
metadata:
  name: deploy-promoter-secret
  namespace: dev
type: Opaque
stringData:
  # Use least privilege token/GitHub App token for deploy repo only.
  # Required scope: repository contents write (workflow scope not required here).
  deploy_repo_token: "<github_app_or_fine_grained_token>"
  # Backward compatible key (optional, can be omitted after migration).
  github_token: "<legacy_token_optional>"
  harbor_url: "https://harbor.example.com"
  harbor_username: "<harbor_user>"
  harbor_password: "<harbor_password>"
  argocd_server: "https://argocd.example.com"
  argocd_token: "<argocd_token>"
