apiVersion: batch/v1
kind: CronJob
metadata:
  name: deploy-promoter
  namespace: shared-platform
spec:
  schedule: "*/1 * * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          imagePullSecrets:
            - name: ghcr-pull
          restartPolicy: OnFailure
          containers:
            - name: promoter
              image: ghcr.io/brunogaosz/ljwx-deploy-promoter:main
              imagePullPolicy: Always
              env:
                - name: DEPLOY_REPO_URL
                  value: https://github.com/BrunoGaoSZ/ljwx-deploy.git
                - name: RETRY_MAX
                  value: "10"
                - name: SERVICE_MAP_PATH
                  value: release/services.local-k3s.yaml
                - name: DRY_RUN
                  value: "0"
                - name: HARBOR_URL
                  value: https://harbor.omniverseai.net
                - name: DEPLOY_REPO_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: promoter-secrets
                      key: DEPLOY_REPO_TOKEN
                - name: HARBOR_USER
                  valueFrom:
                    secretKeyRef:
                      name: promoter-secrets
                      key: HARBOR_USER
                - name: HARBOR_PASS
                  valueFrom:
                    secretKeyRef:
                      name: promoter-secrets
                      key: HARBOR_PASS
