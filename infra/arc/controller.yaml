apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://actions-runner-controller.github.io/actions-runner-controller
    chart: actions-runner-controller
    targetRevision: 0.23.3
    helm:
      values: |
        authSecret:
          enabled: true
          create: false
          name: arc-github-token
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-system
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: horizontalrunnerautoscalers.actions.summerwind.dev
      jsonPointers:
        - /spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: runnerdeployments.actions.summerwind.dev
      jsonPointers:
        - /spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: runnerreplicasets.actions.summerwind.dev
      jsonPointers:
        - /spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: runners.actions.summerwind.dev
      jsonPointers:
        - /spec
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      name: runnersets.actions.summerwind.dev
      jsonPointers:
        - /spec
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
