version: 0.2.1

services:
  ljwx-chat:
    provides:
      - capability: conversation.ui
        runtime_facing: false
      - capability: session.preferences
        runtime_facing: false
    consumes:
      - capability: route.execute
        dispatch_via: openclaw
        runtime_facing: true
      - capability: tool.gateway.execute
        dispatch_via: ljwx-core-api
        runtime_facing: true
  openclaw:
    provides:
      - capability: route.execute
        runtime_facing: true
      - capability: response.stream
        runtime_facing: false
      - capability: tool.orchestrate
        runtime_facing: false
    consumes:
      - capability: kb.search
        dispatch_via: knowledge-processor
        runtime_facing: true
      - capability: tool.gateway.execute
        dispatch_via: ljwx-core-api
        runtime_facing: true
      - capability: ticket.create
        dispatch_via: n8n
        runtime_facing: true
  ljwx-core-api:
    provides:
      - capability: customer.lookup
        runtime_facing: true
      - capability: conversation.audit.write
        runtime_facing: true
      - capability: auth.check
        runtime_facing: true
      - capability: tool.gateway.execute
        runtime_facing: true
    consumes: []
  n8n:
    provides:
      - capability: ticket.create
        runtime_facing: true
      - capability: notification.dispatch
        runtime_facing: true
      - capability: approval.flow
        runtime_facing: true
    consumes:
      - capability: auth.check
        dispatch_via: ljwx-core-api
        runtime_facing: true
  ljwx-dify:
    provides:
      - capability: rag.answer
        runtime_facing: false
      - capability: dataset.retrieve
        runtime_facing: false
    consumes:
      - capability: kb.search
        dispatch_via: knowledge-processor
        runtime_facing: true
  knowledge-processor:
    provides:
      - capability: kb.search
        runtime_facing: true
      - capability: knowledge.publish
        runtime_facing: true
      - capability: knowledge.invalidate
        runtime_facing: true
    consumes: []
