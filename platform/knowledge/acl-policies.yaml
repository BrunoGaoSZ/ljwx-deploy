version: 0.1.0

policies:
  public:
    acl_expression_template: visibility == "public"
    allowed_targets:
      - dify-public
      - retrieval-public
    review_required: true
  internal:
    acl_expression_template: visibility == "internal"
    allowed_targets:
      - dify-internal
      - retrieval-internal
    review_required: true
  customer:
    acl_expression_template: customer_id == "{customer_id}"
    allowed_targets:
      - retrieval-customer-template
    review_required: true
    requires_customer_id: true
