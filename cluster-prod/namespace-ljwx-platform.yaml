apiVersion: v1
kind: Namespace
metadata:
  name: ljwx-platform
  labels:
    name: ljwx-platform
    environment: prod
    app: ljwx-platform
  annotations:
    gitops.ljwx.io/namespace-profile: prod-default
    gitops.ljwx.io/registry-profile: harbor-only
    gitops.ljwx.io/runtime-secret-profile: app-runtime
    gitops.ljwx.io/capabilities: ghcr_pull,harbor_pull,runtime_app_secret
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: ljwx-platform
  annotations:
    gitops.ljwx.io/namespace-profile: prod-default
    gitops.ljwx.io/registry-profile: harbor-only
    gitops.ljwx.io/runtime-secret-profile: app-runtime
    gitops.ljwx.io/capabilities: ghcr_pull,harbor_pull,runtime_app_secret
imagePullSecrets:
- name: regcred
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ljwx-platform-quota
  namespace: ljwx-platform
spec:
  hard:
    requests.cpu: '2'
    requests.memory: 4Gi
    limits.cpu: '4'
    limits.memory: 8Gi
    persistentvolumeclaims: '10'
    services: '10'
    pods: '30'
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ljwx-platform-limits
  namespace: ljwx-platform
spec:
  limits:
  - max:
      cpu: '2'
      memory: 4Gi
    min:
      cpu: 100m
      memory: 256Mi
    default:
      cpu: 500m
      memory: 1Gi
    defaultRequest:
      cpu: 250m
      memory: 512Mi
    type: Container
