apiVersion: batch/v1
kind: CronJob
metadata:
  name: registry-pull-secret-sync
  namespace: dev
  labels:
    app.kubernetes.io/name: registry-pull-secret-sync
    app.kubernetes.io/part-of: bid-mvp-factory
spec:
  schedule: "*/2 * * * *"
  timeZone: Asia/Tokyo
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: registry-pull-secret-syncer
          restartPolicy: OnFailure
          containers:
            - name: sync
              image: bitnami/kubectl:1.33.5
              imagePullPolicy: IfNotPresent
              env:
                - name: SOURCE_NAMESPACE
                  value: default
                - name: SOURCE_SECRET
                  value: harbor-registry
                - name: TARGET_NAMESPACE_SELECTOR
                  value: registry-sync.ljwx.io/enabled=true
                - name: TARGET_SECRET_NAMES
                  value: harbor-registry,ghcr-pull,regcred
              command:
                - /bin/sh
                - -ec
                - |
                  set -eu

                  dockerconfigjson="$(kubectl -n "${SOURCE_NAMESPACE}" get secret "${SOURCE_SECRET}" -o jsonpath='{.data.\.dockerconfigjson}')"
                  if [ -z "${dockerconfigjson}" ]; then
                    echo "source secret is empty: ${SOURCE_NAMESPACE}/${SOURCE_SECRET}"
                    exit 1
                  fi

                  namespaces="$(kubectl get ns -l "${TARGET_NAMESPACE_SELECTOR}" -o jsonpath='{.items[*].metadata.name}')"
                  if [ -z "${namespaces}" ]; then
                    echo "no target namespaces matched: ${TARGET_NAMESPACE_SELECTOR}"
                    exit 0
                  fi

                  for ns in ${namespaces}; do
                    for secret_name in $(printf '%s' "${TARGET_SECRET_NAMES}" | tr ',' ' '); do
                      cat <<EOF | kubectl apply -f -
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: ${secret_name}
                    namespace: ${ns}
                  type: kubernetes.io/dockerconfigjson
                  data:
                    .dockerconfigjson: ${dockerconfigjson}
                  EOF
                    done

                    current="$(kubectl -n "${ns}" get sa default -o jsonpath='{.imagePullSecrets[*].name}' 2>/dev/null || true)"
                    if printf '%s\n' "${current}" | tr ' ' '\n' | grep -qx "${SOURCE_SECRET}"; then
                      continue
                    fi

                    if [ -z "${current}" ]; then
                      kubectl -n "${ns}" patch sa default --type=merge -p "{\"imagePullSecrets\":[{\"name\":\"${SOURCE_SECRET}\"}]}"
                    else
                      kubectl -n "${ns}" patch sa default --type=json -p "[{\"op\":\"add\",\"path\":\"/imagePullSecrets/-\",\"value\":{\"name\":\"${SOURCE_SECRET}\"}}]"
                    fi
                  done
