apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: ljwx-dify-web
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ljwx-dify-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ljwx-dify-web
  template:
    metadata:
      labels:
        app: ljwx-dify-web
    spec:
      imagePullSecrets:
        - name: ghcr-pull
        - name: regcred
      containers:
        - name: web
          image: ghcr.io/brunogao/ljwx-dify-web:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: ljwx-dify-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
