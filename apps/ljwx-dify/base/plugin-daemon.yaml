apiVersion: v1
kind: Service
metadata:
  name: plugin-daemon
spec:
  selector:
    app: ljwx-dify-plugin-daemon
  ports:
    - name: http
      port: 5002
      targetPort: 5002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ljwx-dify-plugin-daemon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ljwx-dify-plugin-daemon
  template:
    metadata:
      labels:
        app: ljwx-dify-plugin-daemon
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: plugin-daemon
          image: langgenius/dify-plugin-daemon:0.5.1-local
          ports:
            - containerPort: 5002
              name: http
          env:
            - name: PLUGIN_DAEMON_PORT
              value: "5002"
            - name: REDIS_HOST
              value: "redis-lb.infra.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            - name: REDIS_USERNAME
              value: ""
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ljwx-dify-secrets
                  key: REDIS_PASSWORD
            - name: DB_HOST
              value: "postgres-lb.infra.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_DATABASE
              value: "ljwx_dify"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ljwx-dify-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ljwx-dify-secrets
                  key: DB_PASSWORD
            - name: DIFY_INNER_API_URL
              value: "http://api:5001"
            - name: SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: ljwx-dify-secrets
                  key: PLUGIN_DAEMON_KEY
            - name: DIFY_INNER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ljwx-dify-secrets
                  key: DIFY_INNER_API_KEY
            - name: PLUGIN_REMOTE_INSTALLING_HOST
              value: "https://dify.lingjingwanxiang.cn"
            - name: PLUGIN_REMOTE_INSTALLING_PORT
              value: "443"
            - name: PLUGIN_WORKING_PATH
              value: "/app/plugins"
          envFrom:
            - configMapRef:
                name: ljwx-dify-config
            - secretRef:
                name: ljwx-dify-secrets
          volumeMounts:
            - name: plugins
              mountPath: /app/plugins
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: plugins
          emptyDir: {}
