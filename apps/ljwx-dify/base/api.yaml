apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: ljwx-dify-api
  ports:
    - name: http
      port: 5001
      targetPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ljwx-dify-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ljwx-dify-api
  template:
    metadata:
      labels:
        app: ljwx-dify-api
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: api
          image: ghcr.io/brunogaosz/ljwx-dify-api:latest
          ports:
            - containerPort: 5001
              name: http
          envFrom:
            - configMapRef:
                name: ljwx-dify-config
            - secretRef:
                name: ljwx-dify-secrets
          volumeMounts:
            - name: storage
              mountPath: /app/api/storage
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 5
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: ljwx-dify-storage
