apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ljwx-dify
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/websocket-services: "api"
spec:
  ingressClassName: traefik
  rules:
    - host: dify.lingjingwanxiang.cn
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 5001
          - path: /console/api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 5001
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 5001
          - path: /files
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 5001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
