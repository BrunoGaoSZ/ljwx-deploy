service: ljwx-dify
environment: dev
namespace: ljwx-dify-dev
cluster_bootstrap: true
ingress_profile: traefik-letsencrypt-public
public_host: dify.lingjingwanxiang.cn
generate_ingress: false
ingress_class_name: traefik
cluster_issuer: dnspod-letsencrypt
tls_secret_name: dify-lingjingwanxiang-cn-tls
namespace_profile: dev-default
registry_profile: ghcr-and-harbor
runtime_secret_profile: app-runtime
capabilities:
- ghcr_pull
- harbor_pull
- runtime_app_secret
- db_init_job
image_pull_secrets:
- ghcr-pull
- regcred
contract_secret_names:
- runtime-app
