apiVersion: v1
kind: Secret
metadata:
  name: agent-platform-db
type: Opaque
stringData:
  # Replace via secret manager or encrypted secret pipeline in non-local environments.
  DATABASE_URL: postgresql+asyncpg://agent:<db_password>@<db_host>:5432/agent_platform
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-platform-app
type: Opaque
stringData:
  REDIS_URL: redis://<redis_host>:6379/0
  ANTHROPIC_AUTH_TOKEN: <set_via_secret_manager>
  JWT_SECRET_KEY: <generate_64_hex_chars>
