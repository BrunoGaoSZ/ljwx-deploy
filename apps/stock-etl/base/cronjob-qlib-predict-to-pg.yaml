apiVersion: batch/v1
kind: CronJob
metadata:
  name: qlib-predict-to-pg
  labels:
    app.kubernetes.io/component: batch
spec:
  schedule: "30 16 * * 1-5"
  timeZone: Asia/Shanghai
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 7200
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: sync-qlib-from-minio
              image: minio/mc:RELEASE.2025-08-13T08-35-41Z
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  set -euo pipefail

                  mc alias set qlib "${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"

                  if ! mc ls "qlib/${MINIO_BUCKET}" >/dev/null 2>&1; then
                    echo "MinIO bucket 不存在，跳过本次 qlib 同步: ${MINIO_BUCKET}"
                    exit 0
                  fi

                  qdata_latest="$(mc cat "qlib/${MINIO_BUCKET}/${MINIO_PREFIX_QDATA}/LATEST" 2>/dev/null | xargs || true)"
                  if [ -z "${qdata_latest}" ]; then
                    echo "qlib_data LATEST 不存在或为空，跳过本次 qlib 同步"
                    exit 0
                  fi

                  model_family="qlib_lightgbm_alpha158"
                  model_latest="$(mc cat "qlib/${MINIO_BUCKET}/${MINIO_PREFIX_MODELS}/${model_family}/LATEST" 2>/dev/null | xargs || true)"
                  if [ -z "${model_latest}" ]; then
                    echo "model LATEST 不存在或为空，跳过本次 qlib 同步"
                    exit 0
                  fi

                  mkdir -p /data/qlib/qlib_data/cn
                  mkdir -p "/data/qlib/artifacts/models/${model_family}/${model_latest}"

                  mc mirror --overwrite --remove \
                    "qlib/${MINIO_BUCKET}/${MINIO_PREFIX_QDATA}/${qdata_latest}/" \
                    /data/qlib/qlib_data/cn/

                  mc mirror --overwrite --remove \
                    "qlib/${MINIO_BUCKET}/${MINIO_PREFIX_MODELS}/${model_family}/${model_latest}/" \
                    "/data/qlib/artifacts/models/${model_family}/${model_latest}/"

                  printf "%s\n" "${model_latest}" > "/data/qlib/artifacts/models/${model_family}/LATEST"
              env:
                - name: MINIO_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_ENDPOINT
                - name: MINIO_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_BUCKET
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_ACCESS_KEY
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_SECRET_KEY
                - name: MINIO_PREFIX_QDATA
                  value: qlib_data/cn
                - name: MINIO_PREFIX_MODELS
                  value: artifacts/models
              volumeMounts:
                - name: qlib-data
                  mountPath: /data/qlib
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
          containers:
            - name: qlib-predict
              image: ghcr.io/brunogao/ljwx-stock/ljwx-stock-qlib-predict:20260305-fix1
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  set -euo pipefail

                  MODEL_LATEST_FILE="/data/qlib/artifacts/models/qlib_lightgbm_alpha158/LATEST"
                  if [ ! -f "${MODEL_LATEST_FILE}" ]; then
                    echo "未检测到模型 LATEST，跳过本次预测"
                    exit 0
                  fi

                  MODEL_DATE="$(xargs < "${MODEL_LATEST_FILE}")"
                  if [ -z "${MODEL_DATE}" ]; then
                    echo "模型 LATEST 为空，跳过本次预测"
                    exit 0
                  fi

                  MODEL_DIR="/data/qlib/artifacts/models/qlib_lightgbm_alpha158/${MODEL_DATE}"
                  if [ ! -f "${MODEL_DIR}/model.pkl" ] || [ ! -f "${MODEL_DIR}/handler_config.yaml" ] || [ ! -f "${MODEL_DIR}/meta.json" ]; then
                    echo "模型产物不完整，跳过本次预测: ${MODEL_DIR}"
                    exit 0
                  fi

                  if [ ! -f "/data/qlib/qlib_data/cn/calendars/day.txt" ]; then
                    echo "未检测到 qlib provider 数据，跳过本次预测"
                    exit 0
                  fi

                  exec python -m qlib_predict.app.predict_to_pg
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-etl-secret
                      key: DATABASE_URL
                - name: QLIB_PROVIDER_URI
                  value: /data/qlib/qlib_data/cn
                - name: QLIB_MODEL_ROOT
                  value: /data/qlib/artifacts/models
                - name: CANDIDATE_POOL_SIZE
                  value: "300"
                - name: CODE_VERSION
                  value: p3a-fix20260305
              volumeMounts:
                - name: qlib-data
                  mountPath: /data/qlib
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "1"
                  memory: 2Gi
          volumes:
            - name: qlib-data
              persistentVolumeClaim:
                claimName: qlib-pvc
