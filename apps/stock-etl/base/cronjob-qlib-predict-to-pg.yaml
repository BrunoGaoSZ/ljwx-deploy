apiVersion: batch/v1
kind: CronJob
metadata:
  name: qlib-predict-to-pg
  labels:
    app.kubernetes.io/component: batch
spec:
  schedule: "30 16 * * 1-5"
  timeZone: Asia/Shanghai
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 7200
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: sync-qlib-from-minio
              image: minio/mc:RELEASE.2024-06-13T22-53-53Z
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -ec
                - |
                  set -euo pipefail

                  mc alias set qlib "${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"

                  qdata_latest="$(mc cat "qlib/${MINIO_BUCKET}/${MINIO_PREFIX_QDATA}/LATEST" | tr -d '\r\n')"
                  if [ -z "${qdata_latest}" ]; then
                    echo "qlib_data LATEST 为空" >&2
                    exit 1
                  fi

                  model_family="qlib_lightgbm_alpha158"
                  model_latest="$(mc cat "qlib/${MINIO_BUCKET}/${MINIO_PREFIX_MODELS}/${model_family}/LATEST" | tr -d '\r\n')"
                  if [ -z "${model_latest}" ]; then
                    echo "model LATEST 为空" >&2
                    exit 1
                  fi

                  mkdir -p /data/qlib/qlib_data/cn
                  mkdir -p "/data/qlib/artifacts/models/${model_family}/${model_latest}"

                  mc mirror --overwrite --remove \
                    "qlib/${MINIO_BUCKET}/${MINIO_PREFIX_QDATA}/${qdata_latest}/" \
                    /data/qlib/qlib_data/cn/

                  mc mirror --overwrite --remove \
                    "qlib/${MINIO_BUCKET}/${MINIO_PREFIX_MODELS}/${model_family}/${model_latest}/" \
                    "/data/qlib/artifacts/models/${model_family}/${model_latest}/"

                  printf "%s\n" "${model_latest}" > "/data/qlib/artifacts/models/${model_family}/LATEST"
              env:
                - name: MINIO_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_ENDPOINT
                - name: MINIO_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_BUCKET
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_ACCESS_KEY
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_SECRET_KEY
                - name: MINIO_PREFIX_QDATA
                  value: qlib_data/cn
                - name: MINIO_PREFIX_MODELS
                  value: artifacts/models
              volumeMounts:
                - name: qlib-data
                  mountPath: /data/qlib
              resources:
                requests:
                  cpu: 200m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
          containers:
            - name: qlib-predict
              image: ghcr.io/brunogao/ljwx-stock/ljwx-stock-qlib-predict:bootstrap
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -m
                - qlib_predict.app.predict_to_pg
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-etl-secret
                      key: DATABASE_URL
                - name: QLIB_PROVIDER_URI
                  value: /data/qlib/qlib_data/cn
                - name: QLIB_MODEL_ROOT
                  value: /data/qlib/artifacts/models
                - name: CANDIDATE_POOL_SIZE
                  value: "300"
                - name: CODE_VERSION
                  value: p3a
              volumeMounts:
                - name: qlib-data
                  mountPath: /data/qlib
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "1"
                  memory: 2Gi
          volumes:
            - name: qlib-data
              persistentVolumeClaim:
                claimName: qlib-pvc
