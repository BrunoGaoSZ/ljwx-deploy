apiVersion: batch/v1
kind: CronJob
metadata:
  name: kline-backfill-1200
  labels:
    app.kubernetes.io/component: batch
spec:
  schedule: "0 3 1 1 *"
  timeZone: Asia/Shanghai
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 43200
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: kline-etl
              image: ghcr.io/brunogao/ljwx-stock/ljwx-stock-kline-etl:bootstrap
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -m
                - stock_etl.app.main
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-etl-secret
                      key: DATABASE_URL
                - name: RUN_MODE
                  value: backfill
                - name: ADJUST
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: ADJUST
                - name: TRADING_DAYS
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: TRADING_DAYS
                - name: BATCH_SIZE
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: BATCH_SIZE
                - name: REQUEST_SLEEP_MS
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: REQUEST_SLEEP_MS
                - name: REQUEST_RETRIES
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: REQUEST_RETRIES
                - name: SYMBOL_LIMIT
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: SYMBOL_LIMIT
                - name: LOG_LEVEL
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: LOG_LEVEL
              resources:
                requests:
                  cpu: "1"
                  memory: 2Gi
                limits:
                  cpu: "4"
                  memory: 8Gi
