apiVersion: batch/v1
kind: CronJob
metadata:
  name: qlib-bootstrap-weekly
  labels:
    app.kubernetes.io/component: batch
spec:
  schedule: "0 3 * * 6"
  timeZone: Asia/Shanghai
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 21600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: qlib-bootstrap
              image: ghcr.io/brunogao/ljwx-stock/ljwx-stock-qlib-bootstrap:20260305-fix1
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -m
                - qlib_bootstrap.app.main
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-etl-secret
                      key: DATABASE_URL
                - name: MINIO_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_ENDPOINT
                - name: MINIO_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_BUCKET
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_ACCESS_KEY
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: qlib-minio-secret
                      key: MINIO_SECRET_KEY
                - name: QLIB_REGION
                  value: cn
                - name: OUTPUT_ROOT
                  value: /data/qlib/bootstrap-out
                - name: MODEL_NAME
                  value: qlib_lightgbm_alpha158
                - name: HORIZON_DAYS
                  value: "5"
                - name: LOOKBACK_YEARS
                  value: "8"
                - name: EXPORT_LOOKBACK_CALENDAR_DAYS
                  value: "4500"
                - name: CODE_VERSION
                  value: p6a-fix20260305
              volumeMounts:
                - name: qlib-data
                  mountPath: /data/qlib
              resources:
                requests:
                  cpu: "1"
                  memory: 2Gi
                limits:
                  cpu: "2"
                  memory: 6Gi
          volumes:
            - name: qlib-data
              persistentVolumeClaim:
                claimName: qlib-pvc
