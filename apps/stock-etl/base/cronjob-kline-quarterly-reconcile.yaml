apiVersion: batch/v1
kind: CronJob
metadata:
  name: kline-quarterly-reconcile
  annotations:
    argocd.argoproj.io/ignore-healthcheck: "true"
  labels:
    app.kubernetes.io/component: batch
spec:
  schedule: "0 3 1 */3 *"
  timeZone: Asia/Shanghai
  suspend: false
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 21600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: kline-etl
              image: ghcr.io/brunogao/ljwx-stock/ljwx-stock-kline-etl:bootstrap
              imagePullPolicy: IfNotPresent
              command:
                - python
                - -m
                - stock_etl.app.main
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: stock-etl-secret
                      key: DATABASE_URL
                - name: RUN_MODE
                  value: reconcile
                - name: ADJUST
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: ADJUST
                - name: RECONCILE_LOOKBACK_CALENDAR_DAYS
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: RECONCILE_LOOKBACK_CALENDAR_DAYS
                - name: BATCH_SIZE
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: BATCH_SIZE
                - name: REQUEST_SLEEP_MS
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: REQUEST_SLEEP_MS
                - name: REQUEST_RETRIES
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: REQUEST_RETRIES
                - name: SYMBOL_LIMIT
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: SYMBOL_LIMIT
                - name: LOG_LEVEL
                  valueFrom:
                    configMapKeyRef:
                      name: kline-etl-config
                      key: LOG_LEVEL
              resources:
                requests:
                  cpu: "1"
                  memory: 2Gi
                limits:
                  cpu: "2"
                  memory: 4Gi
