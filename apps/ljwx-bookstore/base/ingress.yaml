---
# =============================================================================
# ljwx-bookstore Ingress Configuration
# 域名: bookstore.lingjingwanxiang.cn (HTTPS)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ljwx-bookstore
  namespace: ljwx-bookstore
  labels:
    app: ljwx-bookstore
    component: backend
  annotations:
    cert-manager.io/cluster-issuer: dnspod-letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: ljwx-bookstore-root-redirect@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - bookstore.lingjingwanxiang.cn
      secretName: bookstore-lingjingwanxiang-cn-tls

  # 路由规则
  rules:
    # 正式域名
    - host: bookstore.lingjingwanxiang.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ljwx-bookstore
                port:
                  number: 80

    # 历史本地调试域名
    - host: bookstore.192.168.1.83.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ljwx-bookstore
                port:
                  number: 80
