apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-agent
  labels:
    app: stock-agent
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-agent
  template:
    metadata:
      labels:
        app: stock-agent
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: stock-agent
          image: ghcr.io/brunogao/ljwx-stock/ljwx-stock-agent:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stock-etl-secret
                  key: DATABASE_URL
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secret
                  key: API_KEY
            - name: ANTHROPIC_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secret
                  key: ANTHROPIC_AUTH_TOKEN
            - name: ANTHROPIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: stock-agent-secret
                  key: ANTHROPIC_BASE_URL
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: LOG_LEVEL
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: ENVIRONMENT
            - name: RATE_LIMIT_RPM
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: RATE_LIMIT_RPM
            - name: MAX_TOKENS_PER_RUN
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: MAX_TOKENS_PER_RUN
            - name: CANDIDATE_POOL_SIZE
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: CANDIDATE_POOL_SIZE
            - name: DISPLAY_TOP_N
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: DISPLAY_TOP_N
            - name: WRITE_RECO
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: WRITE_RECO
            - name: CODE_VERSION
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: CODE_VERSION
            - name: LLM_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: LLM_PROVIDER
            - name: ANTHROPIC_MODEL
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: ANTHROPIC_MODEL
            - name: LLM_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: LLM_TIMEOUT_SECONDS
            - name: LLM_MAX_OUTPUT_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: LLM_MAX_OUTPUT_TOKENS
            - name: MAX_USER_QUERY_LEN
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: MAX_USER_QUERY_LEN
            - name: METRICS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: METRICS_ENABLED
            - name: QC_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: QC_ENABLED
            - name: QC_LOOKBACK_DAYS
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: QC_LOOKBACK_DAYS
            - name: QC_COLD_START_MIN
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: QC_COLD_START_MIN
            - name: QC_OVERLAP_ERROR_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: QC_OVERLAP_ERROR_THRESHOLD
            - name: QC_OVERLAP_WARN_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: stock-agent-config
                  key: QC_OVERLAP_WARN_THRESHOLD
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
