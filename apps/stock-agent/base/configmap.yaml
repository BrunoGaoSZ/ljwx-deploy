apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-agent-config
data:
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "development"
  RATE_LIMIT_RPM: "30"
  MAX_TOKENS_PER_RUN: "50000"
  DB_POOL_MIN_SIZE: "2"
  DB_POOL_MAX_SIZE: "10"
  DB_POOL_TIMEOUT_SECONDS: "5"
  DB_COMMAND_TIMEOUT_SECONDS: "5"
  KLINE_QUERY_TIMEOUT_SECONDS: "5"
  KLINE_DEFAULT_LIMIT: "60"
  KLINE_MAX_LIMIT: "500"
  KLINE_BULK_PER_SYMBOL_LIMIT: "60"
  KLINE_BULK_MAX_SYMBOLS: "500"
  KLINE_BULK_MAX_ROWS: "20000"
  CANDIDATE_POOL_SIZE: "300"
  DISPLAY_TOP_N: "20"
  MIN_AMOUNT_AVG: "10000000"
  LOOKBACK_DAYS_CALENDAR: "150"
  STRATEGY_WEIGHT_MOMENTUM_RULE_V1: "0.6"
  STRATEGY_WEIGHT_TECHNICAL_PATTERN_V1: "0.4"
  STRATEGY_WEIGHT_QLIB_RECO_READER_V1: "0.2"
  WRITE_RECO: "true"
  CODE_VERSION: "gitops"
  LLM_PROVIDER: "claude"
  ANTHROPIC_MODEL: "claude-sonnet-4-6-20260217"
  LLM_TIMEOUT_SECONDS: "20"
  LLM_MAX_OUTPUT_TOKENS: "1200"
  MAX_USER_QUERY_LEN: "2000"
  METRICS_ENABLED: "true"
  QC_ENABLED: "true"
  QC_LOOKBACK_DAYS: "20"
  QC_COLD_START_MIN: "5"
  QC_OVERLAP_ERROR_THRESHOLD: "1.0"
  QC_OVERLAP_WARN_THRESHOLD: "0.9"
