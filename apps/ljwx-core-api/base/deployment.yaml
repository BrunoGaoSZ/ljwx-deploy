apiVersion: apps/v1
kind: Deployment
metadata:
  name: ljwx-core-api
  labels:
    app: ljwx-core-api
  annotations: &id001
    gitops.ljwx.io/namespace-profile: dev-default
    gitops.ljwx.io/registry-profile: ghcr-and-harbor
    gitops.ljwx.io/runtime-secret-profile: app-runtime
    gitops.ljwx.io/capabilities: ghcr_pull,harbor_pull,runtime_app_secret
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ljwx-core-api
  template:
    metadata:
      labels:
        app: ljwx-core-api
      annotations: *id001
    spec:
      containers:
      - name: ljwx-core-api
        image: harbor.eu.lingjingwanxiang.cn/ljwx/ljwx-core-api:latest
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        envFrom:
        - secretRef:
            name: runtime-app
            optional: true
      imagePullSecrets:
      - name: ghcr-pull
      - name: regcred
