apiVersion: apps/v1
kind: Deployment
metadata:
  name: ljwx-platform-admin-ui
  labels:
    app: ljwx-platform-admin-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ljwx-platform-admin-ui
  template:
    metadata:
      labels:
        app: ljwx-platform-admin-ui
    spec:
      imagePullSecrets:
        - name: ghcr-pull
        - name: harbor-pull
      containers:
        - name: ljwx-platform-admin-ui
          image: ghcr.io/brunogao/ljwx-platform/ljwx-platform-admin-ui:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
