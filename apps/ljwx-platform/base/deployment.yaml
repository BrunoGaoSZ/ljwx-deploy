apiVersion: apps/v1
kind: Deployment
metadata:
  name: ljwx-platform
  labels:
    app: ljwx-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ljwx-platform
  template:
    metadata:
      labels:
        app: ljwx-platform
    spec:
      containers:
        - name: ljwx-platform
          image: harbor.omniverseai.net/app/ljwx-platform:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
