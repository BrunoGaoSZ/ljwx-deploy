apiVersion: apps/v1
kind: Deployment
metadata:
  name: ljwx-platform
  labels:
    app: ljwx-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ljwx-platform
  template:
    metadata:
      labels:
        app: ljwx-platform
    spec:
      containers:
        - name: ljwx-platform
          image: harbor.omniverseai.net/app/ljwx-platform:latest
          envFrom:
            - configMapRef:
                name: ljwx-platform-runtime
            - secretRef:
                name: ljwx-platform-db
          volumeMounts:
            - name: app-logs
              mountPath: /workspace/logs
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: app-logs
          emptyDir: {}
