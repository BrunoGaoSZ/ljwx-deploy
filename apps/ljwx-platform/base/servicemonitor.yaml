apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ljwx-platform
  labels:
    app: ljwx-platform
    component: backend
    release: prometheus
spec:
  selector:
    matchLabels:
      app: ljwx-platform
  namespaceSelector:
    matchNames:
      - ljwx-platform
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
      scrapeTimeout: 10s
      scheme: http
      bearerTokenSecret:
        name: ljwx-platform-metrics-token
        key: token
      relabelings:
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
          action: replace
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
          action: replace
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
          action: replace
        - sourceLabels: [__meta_kubernetes_service_label_app]
          targetLabel: app
          action: replace
  jobLabel: app
