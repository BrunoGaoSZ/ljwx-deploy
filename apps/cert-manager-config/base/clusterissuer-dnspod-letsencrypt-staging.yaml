apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: dnspod-letsencrypt-staging
  annotations:
    gitops.ljwx.io/issuer-implementation: http01-traefik
spec:
  acme:
    email: platform@lingjingwanxiang.cn
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: dnspod-letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
