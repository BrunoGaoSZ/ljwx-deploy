apiVersion: apps/v1
kind: Deployment
metadata:
  name: ljwx-website
spec:
  template:
    spec:
      containers:
        - name: ljwx-website
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
