apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ljwx-website-dev
resources:
  - ../../base
patches:
  - path: service-nodeport.yaml
  - path: deployment-probe.yaml
images:
  - name: harbor.omniverseai.net/ljwx/ljwx-website
    newName: nginxinc/nginx-unprivileged
    newTag: "1.27-alpine"
replicas:
  - name: ljwx-website
    count: 1
