apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ljwx-website-dev
resources:
- ../../base
- ingress.yaml
patches:
- path: service-nodeport.yaml
- path: deployment-probe.yaml
images:
- name: ghcr.io/brunogao/ljwx-website
  newName: ghcr.io/brunogao/ljwx-website
  newTag: latest
replicas:
- name: ljwx-website
  count: 1
