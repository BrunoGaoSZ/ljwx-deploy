apiVersion: apps/v1
kind: Deployment
metadata:
  name: ljwx-shiti
  labels:
    app: ljwx-shiti
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ljwx-shiti
  template:
    metadata:
      labels:
        app: ljwx-shiti
    spec:
      containers:
        - name: ljwx-shiti
          image: harbor.eu.lingjingwanxiang.cn/ljwx/ljwx-shiti:latest
          envFrom:
            - secretRef:
                name: ljwx-shiti-env
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
