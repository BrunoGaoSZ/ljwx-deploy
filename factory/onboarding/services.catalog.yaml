version: 1

# Batch onboarding catalog for new and existing services.
# Run:
#   uvx --with pyyaml python scripts/factory/onboard_services.py --dry-run
#   uvx --with pyyaml python scripts/factory/onboard_services.py
services:
  # Existing project onboarding example (only mapping + smoke + argocd file sync)
  - service: ljwx-platform
    environment: prod
    overlay_path: apps/ljwx-platform/overlays/prod/kustomization.yaml
    kustomize_image_name: ghcr.io/brunogao/ljwx-platform
    harbor_image: harbor.eu.lingjingwanxiang.cn/app/ljwx-platform
    argocd_app: ljwx-platform
    smoke_endpoint: http://ljwx-platform.ljwx-platform.svc.cluster.local/
    deploy_namespace: ljwx-platform
    profiles: [local-k3s, orbstack-k3s-cn]
    scaffold_app: false
    generate_argocd_app: false
    argocd_app_file: ""

  # New project onboarding example (generate app skeleton + argocd app)
  - service: demo-new-service
    environment: dev
    overlay_path: apps/demo-new-service/overlays/demo-new-service-dev/kustomization.yaml
    kustomize_image_name: ghcr.io/brunogao/demo-new-service
    harbor_image: harbor.eu.lingjingwanxiang.cn/app/demo-new-service
    argocd_app: demo-new-service-dev
    smoke_endpoint: http://demo-new-service.demo-new-service-dev.svc.cluster.local/health
    deploy_namespace: demo-new-service-dev
    profiles: [local-k3s, orbstack-k3s-cn]
    scaffold_app: true
    generate_argocd_app: true
    argocd_app_file: argocd-apps/90-demo-new-service-dev.yaml

  - service: ljwx-shiti
    environment: dev
    overlay_path: apps/ljwx-shiti/overlays/dev/kustomization.yaml
    kustomize_image_name: ghcr.io/brunogao/ljwx-shiti
    harbor_image: harbor.eu.lingjingwanxiang.cn/ljwx/ljwx-shiti
    argocd_app: ljwx-shiti-dev
    smoke_endpoint: http://ljwx-shiti.ljwx-shiti-dev.svc.cluster.local/health
    deploy_namespace: ljwx-shiti-dev
    profiles: [local-k3s, orbstack-k3s-cn]
    scaffold_app: true
    generate_argocd_app: true
    argocd_app_file: argocd-apps/90-ljwx-shiti-dev.yaml

  - service: ljwx-bookstore
    environment: dev
    overlay_path: apps/ljwx-bookstore/overlays/ljwx-bookstore/kustomization.yaml
    kustomize_image_name: harbor.omniverseai.net/ljwx/ljwx-bookstore
    harbor_image: harbor.omniverseai.net/app/ljwx-bookstore
    argocd_app: ljwx-bookstore
    smoke_endpoint: http://ljwx-bookstore.ljwx-bookstore.svc.cluster.local/fiction/actuator/health
    deploy_namespace: ljwx-bookstore
    profiles: [local-k3s, orbstack-k3s-cn]
    scaffold_app: false
    generate_argocd_app: false
    argocd_app_file: argocd-apps/70-ljwx-bookstore-dev.yaml
