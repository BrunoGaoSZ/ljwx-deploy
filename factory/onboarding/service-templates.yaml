version: 1
templates:
  service-default:
    description: Scaffold a conventional single-image service with a /health smoke path.
    overlay_name_template: "{service}-{environment}"
    smoke_host_template: "{service}"
    public_host_template: ""
    smoke_path: /health
    smoke_port: ""
    ghcr_org: brunogao
    harbor_registry: harbor.eu.lingjingwanxiang.cn
    harbor_project: ljwx
    profiles:
      - local-k3s
      - orbstack-k3s-cn
    namespace_profile: ""
    registry_profile: ghcr-and-harbor
    runtime_secret_profile: app-runtime
    capabilities:
      - ghcr_pull
      - harbor_pull
      - runtime_app_secret
    scaffold_app: true
    generate_argocd_app: true
    cluster_bootstrap: true
    ingress_profile: none
    argocd_order: 90
  legacy-service:
    description: Reuse an existing overlay and only generate GitOps control-plane artifacts.
    overlay_name_template: "{service}-{environment}"
    smoke_host_template: "{service}"
    public_host_template: ""
    smoke_path: /
    smoke_port: ""
    ghcr_org: brunogao
    harbor_registry: harbor.eu.lingjingwanxiang.cn
    harbor_project: ljwx
    profiles:
      - local-k3s
      - orbstack-k3s-cn
    namespace_profile: ""
    registry_profile: ghcr-and-harbor
    runtime_secret_profile: app-runtime
    capabilities:
      - ghcr_pull
      - harbor_pull
      - runtime_app_secret
    scaffold_app: false
    generate_argocd_app: true
    cluster_bootstrap: true
    ingress_profile: none
    argocd_order: 90
  public-service:
    description: Scaffold a conventional single-image service with public HTTPS ingress.
